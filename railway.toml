# railway.toml
[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"

[http]
headers = { "Access-Control-Allow-Origin" = "*", "Access-Control-Allow-Methods" = "POST, OPTIONS", "Access-Control-Allow-Headers" = "Content-Type" }